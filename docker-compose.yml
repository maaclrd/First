services:
  app:
    image: testefirst-app-image
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testefirst-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
      - redis
    networks:
      - testefirst-network

  webserver:
    image: nginx:1.27-alpine
    container_name: testefirst-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - testefirst-network

  db:
    image: mysql:8.0
    container_name: testefirst-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - testefirst-network

  redis:
    image: redis:7-alpine
    container_name: testefirst-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - testefirst-network

  worker:
    image: testefirst-app-image
    container_name: testefirst-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -lc "while [ ! -f /var/www/html/artisan ]; do sleep 2; done; php /var/www/html/artisan queue:work"
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis
      - db
    networks:
      - testefirst-network

volumes:
  dbdata:

networks:
  testefirst-network:
    driver: bridge
